name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses
      
      - name: Install dependencies
        run: npm install
      
      - name: Build React app
        run: |
          export VITE_API_URL=https://pickmo-ai.onrender.com/api
          npm run build
      
      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      
      - name: Copy logo to Android resources
        run: |
          # Check if logo exists
          if [ -f "public/pickmo-ai.png" ]; then
            echo "✅ Logo found: public/pickmo-ai.png"
            
            # Create directories
            mkdir -p android/app/src/main/res/mipmap-mdpi
            mkdir -p android/app/src/main/res/mipmap-hdpi
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            mkdir -p android/app/src/main/res/mipmap-xxhdpi
            mkdir -p android/app/src/main/res/mipmap-xxxhdpi
            
            # Install ImageMagick for resizing
            sudo apt-get update
            sudo apt-get install -y imagemagick
            
            # Generate icons (use a default icon if resizing fails)
            cp public/pickmo-ai.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp public/pickmo-ai.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
            cp public/pickmo-ai.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp public/pickmo-ai.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
            cp public/pickmo-ai.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp public/pickmo-ai.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
            cp public/pickmo-ai.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp public/pickmo-ai.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
            cp public/pickmo-ai.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            cp public/pickmo-ai.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
            
            echo "✅ Logo copied to all resolutions"
          else
            echo "⚠️ Logo not found at public/pickmo-ai.png"
          fi
      
      - name: Sync Capacitor
        run: npx cap sync
      
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PickmoAI-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk
